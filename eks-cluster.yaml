apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: sandbox-ha-cluster
  region: us-east-1
  version: "1.30"

iam:
  withOIDC: true

managedNodeGroups:
  - name: m5-large-nodes
    instanceType: m5.large
    minSize: 3
    maxSize: 10
    desiredCapacity: 3
    iam:
      withAddonPolicies:
        autoScaler: true
        albIngress: true
        cloudWatch: true
