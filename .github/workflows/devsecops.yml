name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: finance-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Secret Scanning (TruffleHog)
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ""
        head: ${{ github.ref_name }}
        extra_args: --debug --only-verified

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: SAST (Bandit for Python)
      run: |
        pip install bandit
        bandit -r app/ -ll -ii

    - name: SCA (Trivy Filesystem Scan)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    - name: Build Docker Image
      run: |
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

    - name: Container Vulnerability Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    # Note: In a real environment, you would use aws-actions/configure-aws-credentials
    # via OIDC (Role ARN) here to authenticate to AWS securely, then login to ECR.
    # We skip the actual push here for the demonstration.

    - name: Generate SBOM (Syft)
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.1.1

    - name: Sign Container Image (Keyless via Sigstore)
      run: |
        # In a real environment after pushing to ECR:
        # cosign sign --yes $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
        echo "Image successfully built, scanned, and signed!"


