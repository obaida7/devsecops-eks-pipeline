apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root-user
  annotations:
    policies.kyverno.io/title: Require Non-Root User
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/description: >-
      Containers must be required to run as non-root users. This policy ensures
      `runAsNonRoot` is set to `true`.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-runasnonroot
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Running as root is not allowed. Set runAsNonRoot to true."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
            =(containers):
              - =(securityContext):
                  =(runAsNonRoot): true

---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Image Signatures (Cosign)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/description: >-
      Uses Cosign to verify that all images deployed to the cluster
      have been securely signed by our CI/CD pipeline.
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    - name: verify-signature
      match:
        any:
        - resources:
            kinds:
              - Pod
      verifyImages:
      - imageReferences:
        - "*"
        mutateDigest: true
        # In a real environment, you would fetch this from AWS KMS or a secret
        # For demonstration, this rule asserts the key exists.
        attestors:
        - entries:
          - keyless:
              subject: "https://github.com/your-org/your-repo/.github/workflows/devsecops.yml@refs/heads/main"
              issuer: "https://token.actions.githubusercontent.com"
