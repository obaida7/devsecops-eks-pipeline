apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-finance-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/obaida7/devsecops-eks-pipeline.git'
    path: k8s
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
